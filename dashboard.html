<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title data-i18n-title="meta.title.dashboard">fear.dev — Панель</title>
  <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="/assets/styles.css" />
</head>
<body>
  <div class="topbar">
    <div class="lang-switch" role="tablist" aria-label="Language">
      <button type="button" data-lang-btn="ru">RU</button>
      <button type="button" data-lang-btn="uk">UK</button>
      <button type="button" data-lang-btn="en">EN</button>
    </div>
  </div>

  <main class="shell">
    <section class="dash" aria-label="Dashboard">
      <h2><span data-i18n="dash.welcome">Добро пожаловать,</span> <span id="userLogin">…</span></h2>
      <p class="sub" data-i18n="dash.subtitle">Это ваш кабинет fear.dev. Скоро здесь появится каталог модов и скриптов.</p>

      <div class="userbox">
        <div class="cell"><div class="k" data-i18n="dash.email">Email</div><div class="v" id="userEmail">—</div></div>
        <div class="cell"><div class="k" data-i18n="dash.login">Логин</div><div class="v" id="userLogin2">—</div></div>
        <div class="cell"><div class="k" data-i18n="dash.id">ID</div><div class="v" id="userId">—</div></div>
        <div class="cell"><div class="k" data-i18n="dash.created">Регистрация</div><div class="v" id="userCreated">—</div></div>
      </div>

      <div class="actions">
        <button id="logoutBtn" class="btn btn-ghost" data-i18n="btn.logout">Выйти</button>
      </div>

      <div class="meta" style="margin-top:24px">
        <span data-i18n="meta.system">Система защищена</span>
        <span class="dot" aria-hidden="true"></span>
        <span data-i18n="meta.developer">fear.dev · build 0.1</span>
      </div>
    </section>
  </main>

  <script src="/assets/i18n.js"></script>
  <script src="/assets/auth.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      window.FD_I18N.mount();

      const me = await FD_AUTH.getJson(FD_AUTH.ENDPOINTS.me);
      if (!me.ok || !me.body || !me.body.ok) {
        window.location.replace('/index.html');
        return;
      }
      const u = me.body.user;
      document.getElementById('userLogin').textContent = u.login;
      document.getElementById('userLogin2').textContent = u.login;
      document.getElementById('userEmail').textContent = u.email;
      document.getElementById('userId').textContent = u.id;
      try {
        document.getElementById('userCreated').textContent =
          new Date(u.createdAt).toLocaleString(window.FD_I18N.getLocale());
      } catch {
        document.getElementById('userCreated').textContent = u.createdAt;
      }

      document.getElementById('logoutBtn').addEventListener('click', async () => {
        await FD_AUTH.postJson(FD_AUTH.ENDPOINTS.logout, {});
        window.location.replace('/index.html');
      });
    });
  </script>
</body>
</html>
