# fear.dev — Nginx config snippet for shared hosting.
#
# HOW TO USE:
# ━━━━━━━━━━━
# • ISPmanager: Сайты → ваш домен → Конфигурация Nginx → Дополнительные
#   директивы nginx → вставить содержимое этого файла.
# • Beget / TimeWeb: панель → Сайты → настройки домена → «Nginx конфигурация»
#   (или обращайтесь в поддержку с просьбой добавить этот сниппет).
# • Свой VPS: включить целиком в блок server {} вашего домена.
#
# Предполагается, что PHP-FPM уже подключен на хостинге (fastcgi_pass).
# Замените «/path/to/site» на реальный путь к корню сайта на сервере
# (например /var/www/username/data/www/monarch-crmp.ru).

# ─── Корень сайта ───────────────────────────────────────────────────────────
# root /path/to/site;
# index index.php;

# ─── Блокировка приватных файлов и директорий ────────────────────────────────

# Запретить прямой доступ к lib/, data/ и скрытым файлам (.env, .git и т.д.)
location ~ ^/(lib|data)/ {
    deny all;
    return 404;
}

location ~ /\.(env|git|htaccess|htpasswd|DS_Store) {
    deny all;
    return 404;
}

# Запретить скачивание JSON-хранилища напрямую
location ~ \.(json|log|md)$ {
    deny all;
    return 404;
}

# ─── Статические ассеты с кешем ─────────────────────────────────────────────

location /assets/ {
    expires 30d;
    add_header Cache-Control "public, max-age=2592000";
    try_files $uri =404;
}

# ─── PHP обработка ──────────────────────────────────────────────────────────

# Основной fallback: если файл не найден — попробовать .php
location / {
    try_files $uri $uri/ @php_fallback;
}

location @php_fallback {
    rewrite ^/([^/]+?)/?$ /$1.php last;
    return 404;
}

# PHP-файлы (на большинстве хостингов этот блок уже есть — если конфликтует,
# уберите его и оставьте хостинговый)
location ~ \.php$ {
    # include fastcgi_params;
    # fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    # fastcgi_pass unix:/run/php/php8.2-fpm.sock;  # или 127.0.0.1:9000
    try_files $uri =404;
    include fastcgi_params;
    fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    fastcgi_pass unix:/run/php-fpm/www.sock;
}

# ─── Security headers ───────────────────────────────────────────────────────

add_header X-Content-Type-Options "nosniff" always;
add_header X-Frame-Options "SAMEORIGIN" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;

# ─── Gzip ───────────────────────────────────────────────────────────────────

gzip on;
gzip_types text/html text/css application/javascript application/json image/svg+xml;
gzip_min_length 256;
